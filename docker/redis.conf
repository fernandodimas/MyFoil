# MyFoil Redis Configuration
# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# Connections
timeout 300
tcp-keepalive 60
maxclients 1000

# Security
# requirepass myfoillredispassword  # Uncomment and set password for production

# Logging
loglevel notice

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
